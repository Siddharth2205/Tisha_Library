<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#2c1810"/>
  <!-- Hair back -->
  <ellipse cx="32" cy="18" rx="13" ry="12" fill="#3d2314"/>
  <ellipse cx="23" cy="22" rx="5" ry="9" fill="#3d2314"/>
  <ellipse cx="41" cy="22" rx="5" ry="9" fill="#3d2314"/>
  <!-- Face tilted down slightly (reading) -->
  <ellipse cx="32" cy="21" rx="9.5" ry="10" fill="#f0c8a0"/>
  <!-- Hair bangs -->
  <path d="M22 16 Q27 12 32 14 Q37 12 42 16 Q40 10 32 9 Q24 10 22 16Z" fill="#3d2314"/>
  <!-- Eyebrows -->
  <path d="M26 19 Q28 17.5 30.5 18.5" stroke="#3d2314" stroke-width="0.7" fill="none" stroke-linecap="round"/>
  <path d="M33.5 18.5 Q36 17.5 38 19" stroke="#3d2314" stroke-width="0.7" fill="none" stroke-linecap="round"/>
  <!-- Eyes looking down (reading) -->
  <ellipse cx="28.5" cy="21.5" rx="1.3" ry="0.7" fill="#2c1810"/>
  <ellipse cx="35.5" cy="21.5" rx="1.3" ry="0.7" fill="#2c1810"/>
  <!-- Eyelashes -->
  <path d="M27 21.2 Q28.5 20.2 30 21.2" stroke="#2c1810" stroke-width="0.5" fill="none"/>
  <path d="M34 21.2 Q35.5 20.2 37 21.2" stroke="#2c1810" stroke-width="0.5" fill="none"/>
  <!-- Glasses -->
  <circle cx="28.5" cy="21.5" r="4" stroke="#8b7355" stroke-width="1" fill="none"/>
  <circle cx="35.5" cy="21.5" r="4" stroke="#8b7355" stroke-width="1" fill="none"/>
  <line x1="32.5" y1="21" x2="31.5" y2="21" stroke="#8b7355" stroke-width="1" stroke-linecap="round"/>
  <line x1="24.5" y1="21" x2="22" y2="19.5" stroke="#8b7355" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="39.5" y1="21" x2="42" y2="19.5" stroke="#8b7355" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Small smile -->
  <path d="M29.5 26 Q32 28 34.5 26" stroke="#c48a6a" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M32 23 L31.5 25" stroke="#d4a882" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  <!-- Hair flowing down sides -->
  <path d="M21 18 Q17 26 19 36" stroke="#3d2314" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M43 18 Q47 26 45 36" stroke="#3d2314" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Body/shoulders -->
  <path d="M23 30 Q32 33 41 30 L44 42 H20 Z" fill="#d4a574"/>
  <!-- Arms reaching down to book -->
  <path d="M23 33 Q20 38 22 43" stroke="#f0c8a0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M41 33 Q44 38 42 43" stroke="#f0c8a0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="22" cy="43.5" r="1.8" fill="#f0c8a0"/>
  <circle cx="42" cy="43.5" r="1.8" fill="#f0c8a0"/>
  <!-- Open book she's reading -->
  <path d="M18 44 Q22 42 32 43 Q42 42 46 44 L45 56 Q42 54 32 55 Q22 54 19 56 Z" fill="#faf7f2"/>
  <!-- Book spine curve -->
  <path d="M32 43 L32 55" stroke="#d4c5b0" stroke-width="0.6"/>
  <!-- Left page lines -->
  <line x1="22" y1="47" x2="30" y2="47.5" stroke="#d4c5b0" stroke-width="0.4"/>
  <line x1="22" y1="49" x2="30" y2="49.5" stroke="#d4c5b0" stroke-width="0.4"/>
  <line x1="22" y1="51" x2="29" y2="51.5" stroke="#d4c5b0" stroke-width="0.4"/>
  <!-- Right page lines -->
  <line x1="34" y1="47.5" x2="42" y2="47" stroke="#d4c5b0" stroke-width="0.4"/>
  <line x1="34" y1="49.5" x2="42" y2="49" stroke="#d4c5b0" stroke-width="0.4"/>
  <line x1="34" y1="51.5" x2="41" y2="51" stroke="#d4c5b0" stroke-width="0.4"/>
</svg>
